<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace">

  <!-- background -->
  <rect width="760" height="300" fill="#0d1117" rx="12"/>

  <!-- ── root folder ── -->
  <rect x="290" y="28" width="180" height="56" rx="8" fill="#1c2128" stroke="#d29922" stroke-width="1.5"/>
  <text x="380" y="56" text-anchor="middle" fill="#d29922" font-size="14" font-weight="600">📁 &lt;request&gt;/</text>
  <text x="380" y="74" text-anchor="middle" fill="#6e7681" font-size="10">one piece of work</text>

  <!-- ── connectors: root → four children ── -->
  <line x1="380" y1="84" x2="380" y2="108" stroke="#30363d" stroke-width="1.5"/>
  <line x1="95" y1="108" x2="665" y2="108" stroke="#30363d" stroke-width="1.5"/>
  <line x1="95"  y1="108" x2="95"  y2="132" stroke="#30363d" stroke-width="1.5"/>
  <line x1="285" y1="108" x2="285" y2="132" stroke="#30363d" stroke-width="1.5"/>
  <line x1="475" y1="108" x2="475" y2="132" stroke="#30363d" stroke-width="1.5"/>
  <line x1="665" y1="108" x2="665" y2="132" stroke="#30363d" stroke-width="1.5"/>

  <!-- ── child: PLAN.md ── -->
  <rect x="25" y="132" width="140" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="41" y="160" fill="#6e7681" font-size="11">📄</text>
  <text x="59" y="160" fill="#e6edf3" font-size="13" font-weight="600">PLAN.md</text>
  <text x="41" y="184" fill="#484f58" font-size="10">how you'll do it</text>
  <text x="41" y="200" fill="#484f58" font-size="10">+ the status</text>
  <text x="41" y="222" fill="#3fb950" font-size="10">the approach</text>

  <!-- ── child: TASKS.md ── -->
  <rect x="215" y="132" width="140" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="231" y="160" fill="#6e7681" font-size="11">📄</text>
  <text x="249" y="160" fill="#e6edf3" font-size="13" font-weight="600">TASKS.md</text>
  <text x="231" y="184" fill="#484f58" font-size="10">the checklist</text>
  <text x="231" y="200" fill="#484f58" font-size="10">of steps</text>
  <text x="231" y="222" fill="#58a6ff" font-size="10">the steps</text>

  <!-- ── child: VERIFY.md ── -->
  <rect x="405" y="132" width="140" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="421" y="160" fill="#6e7681" font-size="11">📄</text>
  <text x="439" y="160" fill="#e6edf3" font-size="13" font-weight="600">VERIFY.md</text>
  <text x="421" y="184" fill="#484f58" font-size="10">how you'll know</text>
  <text x="421" y="200" fill="#484f58" font-size="10">it works</text>
  <text x="421" y="222" fill="#d29922" font-size="10">the proof</text>

  <!-- ── child: specs/ ── -->
  <rect x="595" y="132" width="140" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="611" y="160" fill="#6e7681" font-size="11">📁</text>
  <text x="629" y="160" fill="#e6edf3" font-size="13" font-weight="600">specs/</text>
  <text x="611" y="184" fill="#484f58" font-size="10">deeper detail,</text>
  <text x="611" y="200" fill="#484f58" font-size="10">when needed</text>
  <text x="611" y="222" fill="#8b949e" font-size="10">optional</text>

  <!-- caption -->
  <text x="380" y="276" text-anchor="middle" fill="#484f58" font-size="10">plan it · track it · verify it · everything for one request lives together</text>

