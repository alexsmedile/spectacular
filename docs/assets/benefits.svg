<svg viewBox="0 0 960 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace">

  <!-- background -->
  <rect width="960" height="360" fill="#0d1117" rx="12"/>

  <!-- ───────────── card defs ───────────── -->
  <!-- 3 cols x 2 rows. Card 296x150, gap 16, margin 16. -->
  <!-- col x: 16, 328, 640   row y: 16, 182 -->

  <!-- ============ ROW 1 ============ -->

  <!-- Card 1 — Stay coherent (brain / cyan) -->
  <g transform="translate(16,16)">
    <rect width="296" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
    <g transform="translate(20,18)" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- lucide: brain (simplified) -->
      <path d="M12 5a3 3 0 0 0-6 0v1a3 3 0 0 0-2 5 3 3 0 0 0 2 5v1a3 3 0 0 0 6 0z"/>
      <path d="M12 5a3 3 0 0 1 6 0v1a3 3 0 0 1 2 5 3 3 0 0 1-2 5v1a3 3 0 0 1-6 0z"/>
    </g>
    <text x="20" y="74" fill="#e6edf3" font-size="17" font-weight="700">Stay coherent</text>
    <text x="20" y="100" fill="#8b949e" font-size="12.5">Give every agent the same memory.</text>
    <text x="20" y="118" fill="#8b949e" font-size="12.5">Stop re-explaining what you</text>
    <text x="20" y="136" fill="#8b949e" font-size="12.5">already decided.</text>
  </g>

  <!-- Card 2 — Plan, then build (map / violet) -->
  <g transform="translate(328,16)">
    <rect width="296" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
    <g transform="translate(20,18)" stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- lucide: map -->
      <path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3z"/>
      <path d="M9 3v15M15 6v15"/>
    </g>
    <text x="20" y="74" fill="#e6edf3" font-size="17" font-weight="700">Plan, then build</text>
    <text x="20" y="100" fill="#8b949e" font-size="12.5">Decompose any ask into a 7-slot</text>
    <text x="20" y="118" fill="#8b949e" font-size="12.5">plan before code — goal, scope,</text>
    <text x="20" y="136" fill="#8b949e" font-size="12.5">validation.</text>
  </g>

  <!-- Card 3 — Start in seconds (zap / amber) -->
  <g transform="translate(640,16)">
    <rect width="296" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
    <g transform="translate(20,18)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- lucide: zap -->
      <path d="M13 2L4 14h7l-1 8 9-12h-7z"/>
    </g>
    <text x="20" y="74" fill="#e6edf3" font-size="17" font-weight="700">Start in seconds</text>
    <text x="20" y="100" fill="#8b949e" font-size="12.5"><tspan fill="#c9d1d9" font-style="italic">spectacular new</tspan> scaffolds</text>
    <text x="20" y="118" fill="#8b949e" font-size="12.5">PLAN + TASKS pre-shaped.</text>
    <text x="20" y="136" fill="#8b949e" font-size="12.5">No blank-page paralysis.</text>
  </g>

  <!-- ============ ROW 2 ============ -->

  <!-- Card 4 — Roadmap the runway (route / green) -->
  <g transform="translate(16,182)">
    <rect width="296" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
    <g transform="translate(20,18)" stroke="#34d399" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- lucide: route -->
      <circle cx="6" cy="19" r="3"/>
      <circle cx="18" cy="5" r="3"/>
      <path d="M9 19h6a3 3 0 0 0 3-3V8"/>
    </g>
    <text x="20" y="74" fill="#e6edf3" font-size="17" font-weight="700">Roadmap the runway</text>
    <text x="20" y="100" fill="#8b949e" font-size="12.5">Tier releases, sequence versions,</text>
    <text x="20" y="118" fill="#8b949e" font-size="12.5">de-risk the big ones.</text>
    <text x="20" y="136" fill="#8b949e" font-size="12.5">Planning is the work.</text>
  </g>

  <!-- Card 5 — Trust the state (shield-check / blue) -->
  <g transform="translate(328,182)">
    <rect width="296" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
    <g transform="translate(20,18)" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- lucide: shield-check -->
      <path d="M12 2l8 3v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V5z"/>
      <path d="M8.5 12l2.5 2.5 4.5-5"/>
    </g>
    <text x="20" y="74" fill="#e6edf3" font-size="17" font-weight="700">Trust the state</text>
    <text x="20" y="100" fill="#8b949e" font-size="12.5">One source of truth per fact;</text>
    <text x="20" y="118" fill="#8b949e" font-size="12.5">doctor catches drift before it</text>
    <text x="20" y="136" fill="#8b949e" font-size="12.5">bites you.</text>
  </g>

  <!-- Card 6 — Lose nothing (recycle / rose) -->
  <g transform="translate(640,182)">
    <rect width="296" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
    <g transform="translate(20,18)" stroke="#fb7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- lucide: archive -->
      <rect x="3" y="4" width="18" height="4" rx="1"/>
      <path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/>
      <path d="M10 12h4"/>
    </g>
    <text x="20" y="74" fill="#e6edf3" font-size="17" font-weight="700">Lose nothing</text>
    <text x="20" y="100" fill="#8b949e" font-size="12.5">Decisions and memory persist.</text>
    <text x="20" y="118" fill="#8b949e" font-size="12.5">Archive on done, never delete.</text>
  </g>

</svg>
